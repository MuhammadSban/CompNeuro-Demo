<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="demoUI.css">
    <script src="BMI.js"></script>
    <script src="componentAnalysis.js" type="module"></script>
    <script src="network.js" defer></script>
    <title> Makin Computational Neuroscience Lab </title>
</head>

<body>

    <!-- Header UI / Page Select / Options -->
<div class = 'buttons'> 
    <!-- Home Page / Public Facing Info, Maybe Small Visual Demo  -->
        <div class = 'topPanel'>
                <input type= "radio" name = "cont" id = "1" value = "Home" checked class = "inputRad">
                <label for="1">
                        <div class = 'buttonText'> 
                                Home
                        </div>
                        <div class = 'infoTag'>
                                Our lab applies artificial neural networks, statistical modeling, information theory, 
                                and the like to problems in neuroscience. The aim is to make testable predictions about 
                                neural function and dysfunction; to guide the design of experiment; to derive principles 
                                for machine learning from animal learning; and ultimately to improve our understanding of
                                 the brain and to ameliorate neurological disorders in people.
                                <ul>
                                        <li> Speech Decoding </li>

                                        <li> More can be added </li>

                                        <li> More to be added </li>
                                </ul>
                        </div>
                </label>
        </div>
                <!-- Train an NN!-->  
        <div class = 'topPanel'>
                <input type= "radio" name = "cont" id = "2" value = "Train" class = "inputRad">
                <label for="2">
                        <div class = 'buttonText'> 
                                Train an NN!
                        </div>
                            <!-- Neural Network Training demo (from SubDemo) -->
                        <div class="nnDemo">
                                <div class="container">
                                        <h1>Train a Neural Network</h1>

                                        <div class="controls">
                                                <label>
                                                        Hidden layers (comma-separated):
                                                        <input type="text" id="neurons" value="4, 4, 2">
                                                </label>

                                                <label>
                                                        Learning rate:
                                                        <input type="number" id="lr" value="0.03" step="0.01" min="0.001">
                                                </label>

                                                <label>
                                                        Activation:
                                                        <select id="act">
                                                                <option>TanH</option>
                                                                <option>ReLU</option>
                                                                <option>Sigmoid</option>
                                                                <option>GELU</option>
                                                        </select>
                                                </label>

                                                <button id="train-btn">Train</button>
                                        </div>

                                        <div id="status">Ready.</div>

                                        <canvas id="boundary" width="400" height="400"></canvas>
                                </div>
                        </div>
                </label>
        </div>
        
                <!-- 3D Display-->
        <!-- Home-->
        <div class = 'topPanel'>
                <input type= "radio" name = "cont" id = "3" value = "Display" class = "inputRad">
                <label for="3">
                        <div class = 'buttonText'> 
                        Electrode Saliencies
                        </div>

                        <!-- Interactive 3D Model + buildModel parameter controls -->
                        <div class="display3D">

                                <!-- 3D canvas fills the top area -->
                                <div class="display3DTop">
                                        <div id="container3D"></div>
                                        <button id="toggleElecBtn" class="toggleElecBtn">Electrodes ●</button>
                                        <div class="pickerBar">
                                                <div class="saliencyPicker">
                                                        <span class="saliencyLabel">Saliency</span>
                                                        <select id="saliencyMethod" class="saliencySelect"></select>
                                                </div>
                                                <div class="saliencyPicker colorSchemePicker">
                                                        <span class="saliencyLabel">Color Scheme</span>
                                                        <select id="colorScheme" class="saliencySelect"></select>
                                                </div>
                                        </div>
                                </div>

                                <!-- buildModel params — one card per field, all side by side -->
                                <div class="modelParamsRow">

                                        <!-- encoderLayers -->
                                        <div class="paramCard">
                                                <span class="paramCardLabel">Encoder Layers</span>
                                                <div class="layerRow">
                                                        <input type="number" id="encLay0" class="layerInput" min="1" max="4096" value="400">
                                                        <span class="layerSep">›</span>
                                                        <input type="number" id="encLay1" class="layerInput" min="1" max="4096" value="400">
                                                        <span class="layerSep">›</span>
                                                        <input type="number" id="encLay2" class="layerInput" min="1" max="4096" value="400">
                                                </div>
                                        </div>

                                        <div class="paramDivider"></div>

                                        <!-- encEmbedding -->
                                        <div class="paramCard">
                                                <span class="paramCardLabel">Enc. Embed</span>
                                                <input type="number" id="encEmbed" class="paramNumInput" min="1" max="512" value="64">
                                        </div>

                                        <div class="paramDivider"></div>

                                        <!-- decoderLayers -->
                                        <div class="paramCard">
                                                <span class="paramCardLabel">Decoder Layers</span>
                                                <div class="layerRow">
                                                        <input type="number" id="decLay0" class="layerInput" min="1" max="4096" value="800">
                                                        <span class="layerSep">›</span>
                                                        <input type="number" id="decLay1" class="layerInput" min="1" max="4096" placeholder="—">
                                                        <span class="layerSep">›</span>
                                                        <input type="number" id="decLay2" class="layerInput" min="1" max="4096" placeholder="—">
                                                </div>
                                        </div>

                                        <div class="paramDivider"></div>

                                        <!-- decEmbedding -->
                                        <div class="paramCard">
                                                <span class="paramCardLabel">Dec. Embed</span>
                                                <input type="number" id="decEmbedNew" class="paramNumInput" min="1" max="512" value="64">
                                        </div>

                                        <div class="paramDivider"></div>

                                        <!-- temperature → lr  (log scale: 1e-3 at 0, 1e-1 at 1) -->
                                        <div class="paramCard paramCardSlider">
                                                <span class="paramCardLabel">Learning Rate</span>
                                                <span class="paramCardVal" id="lrDisplay">0.01</span>
                                                <input type="range" id="temperature" class="paramSlider"
                                                       min="0" max="1" step="0.01" value="0.5">
                                                <span class="paramCardSub" id="tempDisplay">temperature = 0.50</span>
                                        </div>

                                        <div class="paramDivider"></div>

                                        <!-- typeModel -->
                                        <div class="paramCard">
                                                <span class="paramCardLabel">Model Type</span>
                                                <select id="typeModel" class="paramSelect">
                                                        <option value="RNN">RNN</option>
                                                </select>
                                        </div>

                                        <div class="paramDivider"></div>

                                        <!-- subject — 401 only for now -->
                                        <div class="paramCard">
                                                <span class="paramCardLabel">Subject</span>
                                                <input type="number" id="subjectId" class="paramNumInput" value="401" disabled>
                                        </div>

                                        <div class="paramDivider"></div>

                                        <!-- epochs — capped at 100 -->
                                        <div class="paramCard">
                                                <span class="paramCardLabel">Epochs</span>
                                                <input type="number" id="numEpochs" class="paramNumInput" min="1" max="100" value="10">
                                        </div>

                                        <button class="runBtn runBtnInline" id="runModelBtn">Run Model</button>

                                </div><!-- /modelParamsRow -->

                        </div><!-- /display3D -->
                </label>
                <script src="3D.js" type="module"></script>
        </div>

                <!-- Something Else-->  
        <!-- Home-->
        <div class = 'topPanel'>
                <input type= "radio" name = "cont" id = "4" value = "Component" class = "inputRad">
                <label for="4">
                        <div class = 'buttonText'>
                                Dimensionality Reduction
                        </div>

                        <!-- Component Analysis: dimensionality-reduction controls + plot -->
                        <div class="componentAnalysis">

                                <!-- Control row: dropdowns drive the analysis request -->
                                <div class="caControls">

                                        <div class="caField">
                                                <label class="caLabel" for="caMethod">Method</label>
                                                <select id="caMethod" class="caSelect">
                                                        <option value="pca">Principal Component Analysis</option>
                                                        <option value="tsne">T-Distributed Stochastic Neighbor Embedding</option>
                                                </select>
                                        </div>

                                        <div class="caField">
                                                <label class="caLabel" for="caDimensions">Dimensions</label>
                                                <select id="caDimensions" class="caSelect">
                                                        <option value="2">2</option>
                                                        <option value="3">3</option>
                                                </select>
                                        </div>

                                        <div class="caField">
                                                <label class="caLabel" for="caLayer">Layer</label>
                                                <select id="caLayer" class="caSelect">
                                                        <option value="input">Input</option>
                                                        <option value="encoder1">Encoder 1</option>
                                                        <option value="encoder2">Encoder 2</option>
                                                        <option value="encoder3">Encoder 3</option>
                                                </select>
                                        </div>

                                        <div class="caField">
                                                <label class="caLabel" for="caLabels">Labels</label>
                                                <select id="caLabels" class="caSelect">
                                                        <option value="none">None</option>
                                                        <option value="time">Time</option>
                                                        <option value="phoneme">Phoneme</option>
                                                        <option value="word">Word</option>
                                                </select>
                                        </div>

                                </div><!-- /caControls -->

                                <!-- Plot region: future home of the scrollable / zoomable /
                                     3D-rotatable embedding display (rendered by JS later) -->
                                <div class="caPlot" id="caPlot">
                                        <span class="caPlotPlaceholder">Plot will render here</span>
                                </div>

                        </div><!-- /componentAnalysis -->
                </label>
        </div>

        <div class = 'topPanel'>
                <input type= "radio" name = "cont" id = "5" value = "Something" class = "inputRad">
                <label for="5">
                        <div class = 'buttonText'> 
                                Something Else!
                        </div>
                        <div class = 'Model'>
                                <div id = "BMICalc">
                                        <h1> BMI Calculator! </h1>

                                        <label for="weight"> Weight (lbs) </label>
                                        <input type="number" id = "weight" placeholder="ex. 150"/>

                                        <br>

                                        <label for="height"> Height (ft) </label>
                                        <input type="number" id = "height" placeholder="ex. 5"/>

                                        <label for="heightin"> (in) </label>
                                        <input type="number" id = "heightin" placeholder="ex. 6"/>

                                        <br>

                                        <button onclick="calculateBMI()">Calculate</button>

                                </div>
                                <p id="bmicalcd"></p>
                        </div>
                </label>
        </div>
</div>
</body>
</html>
