<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="demoUI.css">
    <script src="BMI.js"></script>
    <script src="calculator.js"></script>
    <title> Computational Neuroscience </title>
</head>

<body>

    <!-- Header UI / Page Select / Options -->
<div class = 'buttons'> 
    <!-- Home Page / Public Facing Info, Maybe Small Visual Demo  -->
        <div class = 'topPanel'>
                <input type= "radio" name = "cont" id = "1" value = "Home" checked class = "inputRad">
                <label for="1">
                        <div class = 'buttonText'> 
                                Home
                        </div>
                        <div class = 'infoTag'>
                                Our lab applies artificial neural networks, statistical modeling, information theory, 
                                and the like to problems in neuroscience. The aim is to make testable predictions about 
                                neural function and dysfunction; to guide the design of experiment; to derive principles 
                                for machine learning from animal learning; and ultimately to improve our understanding of
                                 the brain and to ameliorate neurological disorders in people.
                                <ul>
                                        <li> This is what a list item looks like </li>

                                        <li> More can be added </li>

                                        <li> More to be added </li>
                                </ul>
                        </div>
                </label>
        </div>
                <!-- Train an NN!-->  
        <div class = 'topPanel'>
                <input type= "radio" name = "cont" id = "2" value = "Train" class = "inputRad">
                <label for="2">
                        <div class = 'buttonText'> 
                                Train an NN!
                        </div>
                            <!-- Neural Network Training-->
                        <div class = 'nncont'>
                                <div class = 'nntitle'>Do something cool!</div>
                                <div class = 'nncolumn'>
                                        <div class = 'modelRend'>
                                                here
                                        </div>
                                        <div class = 'sliderContainer'>
                                                <input type="range" id="paramone" min="0" max="100" value="50" class="slider">
                                                <input type="range" id="paramtwo" min="0" max="100" value="50" class="slider">
                                                <input type="range" id="paramthr" min="0" max="100" value="50" class="slider">
                                                <input type="range" id="paramfou" min="0" max="100" value="50" class="slider">
                                                <input type="range" id="paramfiv" min="0" max="100" value="50" class="slider">
                                                <input type="range" id="paramsix]" min="0" max="100" value="50" class="slider">
                                        </div>
                                </div>
                                <div class = 'nncolumn'>
                                        <div class = 'modelRend'>
                                                two
                                        </div>
                                        <div class = 'sliderContainer'>
                                                <input type="range" id="paramone" min="0" max="100" value="50" class="slider">
                                                <input type="range" id="paramtwo" min="0" max="100" value="50" class="slider">
                                                <input type="range" id="paramthr" min="0" max="100" value="50" class="slider">
                                        </div>
                                </div>
                        </div>
                </label>
        </div>
        
                <!-- 3D Display-->
        <!-- Home-->
        <div class = 'topPanel'>
                <input type= "radio" name = "cont" id = "3" value = "Display" class = "inputRad">
                <label for="3">
                        <div class = 'buttonText'> 
                        Interactive 3D Display
                        </div>

                        <!-- Interactive 3D Model + Training Parameter Controls -->
                        <div class="display3D">
                                <div id="container3D"></div>

                                <div class="sliderPanel">
                                        <div class="sliderPanelTitle">Model Parameters</div>

                                        <div class="sliderContainer">

                                                <!-- Epochs: 1–20 -->
                                                <div class="sliderGroup">
                                                        <span class="sliderVal" id="epochsVal">10</span>
                                                        <input type="range" id="epochs" min="1" max="20" value="10" class="slider"
                                                               oninput="document.getElementById('epochsVal').textContent=this.value">
                                                        <span class="sliderLabel">Epochs</span>
                                                </div>

                                                <!-- Decoder Embedding dim: 1–200 -->
                                                <div class="sliderGroup">
                                                        <span class="sliderVal" id="decEmbedVal">100</span>
                                                        <input type="range" id="decEmbed" min="1" max="200" value="100" class="slider"
                                                               oninput="document.getElementById('decEmbedVal').textContent=this.value">
                                                        <span class="sliderLabel">Dec. Embed</span>
                                                </div>

                                                <!-- Decoder RNN units: 1–800 -->
                                                <div class="sliderGroup">
                                                        <span class="sliderVal" id="decRNNVal">400</span>
                                                        <input type="range" id="decRNN" min="1" max="800" value="400" class="slider"
                                                               oninput="document.getElementById('decRNNVal').textContent=this.value">
                                                        <span class="sliderLabel">Dec. RNN</span>
                                                </div>

                                                <!-- Learning Rate — range/encoding TBD -->
                                                <div class="sliderGroup">
                                                        <span class="sliderVal" id="lrVal">—</span>
                                                        <input type="range" id="lr" min="0" max="100" value="50" class="slider"
                                                               disabled
                                                               oninput="document.getElementById('lrVal').textContent=this.value">
                                                        <span class="sliderLabel sliderLabelTbd">LR (TBD)</span>
                                                </div>

                                                <!-- Param 5 — unlabelled, configurable later -->
                                                <div class="sliderGroup">
                                                        <span class="sliderVal" id="param5Val">—</span>
                                                        <input type="range" id="param5" min="0" max="100" value="50" class="slider"
                                                               disabled
                                                               oninput="document.getElementById('param5Val').textContent=this.value">
                                                        <span class="sliderLabel sliderLabelTbd">—</span>
                                                </div>

                                                <!-- Param 6 — unlabelled, configurable later -->
                                                <div class="sliderGroup">
                                                        <span class="sliderVal" id="param6Val">—</span>
                                                        <input type="range" id="param6" min="0" max="100" value="50" class="slider"
                                                               disabled
                                                               oninput="document.getElementById('param6Val').textContent=this.value">
                                                        <span class="sliderLabel sliderLabelTbd">—</span>
                                                </div>

                                        </div><!-- /sliderContainer -->

                                        <button class="runBtn" id="runModelBtn">Run Model</button>

                                </div><!-- /sliderPanel -->
                        </div><!-- /display3D -->
                </label>
                <script src="3D.js" type="module"></script>
        </div>

                <!-- Something Else-->  
        <!-- Home-->
        <div class = 'topPanel'>
                <input type= "radio" name = "cont" id = "4" value = "Something" class = "inputRad">
                <label for="4">
                        <div class = 'buttonText'> 
                                Something Else!
                        </div>
                             <!-- Toy Problems? Something like that-->
                        <div class = "infoTag">
                                <h2>Calculator!</h2>
                                <br>
                                <div class="calcDisp" id = "calcDisp">
                                        0
                                </div>
                                <br>
                                <input type="button" value="1" class = calcButton onclick="pressButton('1')">
                                <input type="button" value="2" class = calcButton onclick="pressButton('2')">
                                <input type="button" value="3" class = calcButton onclick="pressButton('3')">
                                <input type="button" value="+" class = calcButton onclick="pressButton('+')">
                                <br>
                                <input type="button" value="4" class = calcButton onclick="pressButton('4')">
                                <input type="button" value="5" class = calcButton onclick="pressButton('5')">
                                <input type="button" value="6" class = calcButton onclick="pressButton('6')">
                                <input type="button" value="-" class = calcButton onclick="pressButton('-')">
                                <br>
                                <input type="button" value="7" class = calcButton onclick="pressButton('7')">
                                <input type="button" value="8" class = calcButton onclick="pressButton('8')">
                                <input type="button" value="9" class = calcButton onclick="pressButton('9')">
                                <input type="button" value="x" class = calcButton onclick="pressButton('x')">
                                <br>
                                <input type="button" value="." class = calcButton onclick="pressButton('.')">
                                <input type="button" value="0" class = calcButton onclick="pressButton('0')">
                                <input type="button" value="=" class = calcButton onclick="pressButton('=')">
                                <input type="button" value="÷" class = calcButton onclick="pressButton('÷')">
                                <br>
                                <input type="button" value="C" class = calcButton onclick="pressButton('C')">
                                <br>

                        </div>
                </label>
        </div>

        <div class = 'topPanel'>
                <input type= "radio" name = "cont" id = "5" value = "Something" class = "inputRad">
                <label for="5">
                        <div class = 'buttonText'> 
                                Something Else!
                        </div>
                        <div class = 'Model'>
                                <div id = "BMICalc">
                                        <h1> BMI Calculator! </h1>

                                        <label for="weight"> Weight (lbs) </label>
                                        <input type="number" id = "weight" placeholder="ex. 150"/>

                                        <br>

                                        <label for="height"> Height (ft) </label>
                                        <input type="number" id = "height" placeholder="ex. 5"/>

                                        <label for="heightin"> (in) </label>
                                        <input type="number" id = "heightin" placeholder="ex. 6"/>

                                        <br>

                                        <button onclick="calculateBMI()">Calculate</button>

                                </div>
                                <p id="bmicalcd"></p>
                        </div>
                </label>
        </div>
</div>
</body>
</html>
